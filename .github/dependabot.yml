version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    labels:
      - "version-upgrade"
    commit-message:
      prefix: chore(deps)
    cooldown:
      default-days: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - "version-upgrade"
    commit-message:
      prefix: chore(deps)
    cooldown:
      default-days: 7
